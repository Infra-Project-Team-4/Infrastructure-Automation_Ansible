apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: wms
spec:
  ports:
    - port: 9092
      targetPort: 9092
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kafka-service
  namespace: wms
subsets:
  - addresses:
      - ip: 172.16.0.1 # TODO: 임시값(pfSense 게이트웨이). Kafka VM 구성 후 실제 IP로 교체 필요
    ports:
      - port: 9092
