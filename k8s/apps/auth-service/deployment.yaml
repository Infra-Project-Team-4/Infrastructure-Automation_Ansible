apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: wms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: auth-service
          image: 172.16.20.11/library/auth-service:v1.0.0
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: wms-config
            - secretRef:
                name: wms-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
